<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slydo</title>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans+Flex:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #000000;
            color: white;
            font-family: 'Google Sans Flex', sans-serif;
            line-height: 1.6;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            max-width: 500px;
            text-align: center;
        }

        h1 {
            margin-bottom: 30px;
            font-size: 2.5em;
        }

        .intro {
            margin-bottom: 40px;
            font-size: 1.1em;
            line-height: 1.8;
        }

        .play-button {
            background-color: #f72585;
            color: black;
            border: none;
            padding: 20px 60px;
            font-size: 1.3em;
            font-weight: bold;
            font-family: 'Google Sans Flex', sans-serif;
            border-radius: 8px;
            cursor: pointer;
            margin: 40px 0;
            transition: background-color 0.3s ease;
        }

        .play-button:hover {
            background-color: #ff1493;
        }

        .instructions {
            margin-top: 50px;
            padding-top: 40px;
            border-top: 1px solid white;
            text-align: left;
        }

        .instructions h2 {
            font-size: 1.3em;
            margin-bottom: 20px;
            text-align: center;
        }

        .install-section {
            margin-bottom: 30px;
        }

        .install-section h3 {
            color: #f72585;
            margin-bottom: 10px;
            font-size: 1.1em;
        }

        .install-section p {
            font-size: 0.95em;
            line-height: 1.7;
        }

        a {
            color: #f72585;
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Welcome to Slydo!</h1>
        
        <p class="intro">Tap the PLAY button below to get started. Once you've done that you can save this as an app to your phone:</p>

        <button class="play-button">PLAY</button>

        <div class="instructions">
            <h2>Install as an App</h2>
            
            <div class="install-section">
                <h3>iOS</h3>
                <p>Share → Add to Home Screen → Open as Web App = True</p>
            </div>

            <div class="install-section">
                <h3>Android (Chrome)</h3>
                <p>3 dots Menu → Install & Create Shortcut</p>
            </div>
        </div>
    </div>
</body>
</html>
